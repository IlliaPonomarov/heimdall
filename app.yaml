runtime: go126
api_version: v1

server:
  port: "8080"

load_balancer:
  enabled: true
  strategy: round-robin
  health:
    path: "/health"
    interval: 2s
    timeout: 10s
  resources:
    - "http://localhost:8080"
    - "http://localhost:8081"
    - "http://localhost:8082"
    - "http://localhost:8083"